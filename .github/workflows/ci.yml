name: Python CI/CD

permissions:
  contents: read
  pages: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["master"]

  release:
    types: [published]

jobs:
  test-code:
    if: github.event_name == 'pull_request' || github.event_name == 'release'
    # 1. MATRIX STRATEGY: Runs the tests on Linux, Windows, and Mac simultaneously
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pytest-cov to track test coverage
          pip install pytest pytest-cov build twine
          # The editable install compiles the C extension for the current OS in the matrix
          pip install -e .
          
      - name: Run Pytest with Coverage
        # 2. COVERAGE: Generates an XML report of what lines of code are tested
        run: pytest tests/ --cov=error_translator --cov-report=xml
        
      - name: Upload coverage to Codecov
        # 3. CODECOV: Uploads the report to GitHub so you get a coverage badge!
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          # You can sign up at codecov.io and add this token to your GitHub secrets
          token: ${{ secrets.CODECOV_TOKEN }} 

  publish-to-pypi:
    if: github.event_name == 'release'
    needs: test-code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*