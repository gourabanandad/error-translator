name: Python CI/CD

on:
  # 1. Run tests every time a PR is merged into master
  pull_request:
    types: [closed]
    branches: [ "master" ]
    
  # 2. Run the PyPI upload ONLY when you publish a Release on GitHub
  release:
    types: [published]

jobs:
  test-code:
    # Run tests if a PR was merged, OR if a release was published
    if: github.event.pull_request.merged == true || github.event_name == 'release'
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest build twine
          pip install -e .
      - name: Run Pytest
        run: pytest

  publish-to-pypi:
    # ONLY run this job if a GitHub Release was just published
    if: github.event_name == 'release'
    needs: test-code # Wait for tests to pass first!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*