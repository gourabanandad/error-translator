name: Python CI

# This tells GitHub to run the test every time you push to the 'main' branch
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest # This boots up a Linux server in the cloud

    steps:
    # 1. Download your code onto the cloud server
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install Python 3.12
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3. Install pytest and your package
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .

    # 4. Run the automated tests!
    - name: Run Pytest
      run: |
        pytest