site_name: Error Translator
site_description: Python error translator and traceback explainer for developers. Convert Python exceptions into clear explanations and actionable fixes offline.
site_author: Gourabananda Datta
site_url: https://gourabanandad.github.io/error-translator-cli-v2/
repo_name: gourabanandad/error-translator-cli-v2
repo_url: https://github.com/gourabanandad/error-translator-cli-v2
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Examples: examples.md
  - Contributing: CONTRIBUTING.md